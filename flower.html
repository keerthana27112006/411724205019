<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloom Flower Shop</title>

    <style>
        /* ====== GLOBAL STYLES ====== */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff0f5; /* change here */
        }

        /* ====== HEADER ====== */
        header {
            background-color: #ff69b4; /* change color */
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* ====== NAVBAR ====== */
        nav {
            background-color: #ff1493; /* change color */
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* ====== SECTION ====== */
        section {
            padding: 20px;
            text-align: center;
        }

        /* ====== IMAGE STYLING ====== */
        .flower-img {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            margin: 10px;
        }

        /* ====== VIDEO ====== */
        video {
            width: 400px;
            border-radius: 10px;
        }

        /* ====== BUTTON ====== */
        button {
            background-color: #ff69b4; /* change */
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #ff1493;
        }

        /* ====== FOOTER ====== */
        footer {
            background-color: #ff69b4;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>🌸 Bloom Flower Shop 🌸</h1>
        <p>Fresh Flowers Delivered With Love</p>
    </header>

    <!-- NAVBAR -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Flowers</a>
        <a href="#">Contact</a>
    </nav>

    <!-- FLOWERS SECTION -->
    <section>
        <h2>Our Beautiful Flowers</h2>

        <!-- ADD YOUR OWN IMAGE PATH -->
        <img src="image 1.jpg" class="image">
        <img src="image 3.jpg" class="image">
        <img src="image 4.jpg" class="image">

        <br><br>
        <button>Order Now</button>
    </section>

    <!-- VIDEO SECTION -->
    <section>
        <h2>Watch Our Flower Collection</h2>

        <!-- ADD YOUR VIDEO FILE -->
        <video controls>
            <source src="video.mp4" type="video/mp4">
        </video>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Bloom Flower Shop | All Rights Reserved</p>
    </footer>

</body>
</html>
